<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Archivo — Agenda Cultural</title>
<style>
 * { box-sizing: border-box; margin: 0; padding: 0; }
 body { background: #0d0b15; color: #e2d9e6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: auto; padding: 30px 20px; }
 h1 { color: #d4af37; text-align: center; border-bottom: 2px solid #9b59b6; padding-bottom: 15px; margin-bottom: 5px; font-size: 2.2em; }
 .subtitle { text-align: center; color: #888; font-size: 0.9em; margin-bottom: 30px; }
 .tabs { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
 .tab-btn { background: #161224; color: #d4af37; border: 1px solid #9b59b6; padding: 12px 20px; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 1em; transition: all 0.2s; }
 .tab-btn:hover { background: #2a2045; }
 .tab-btn.active { background: #9b59b6; color: #fff; border-color: #d4af37; box-shadow: 0 0 10px rgba(155, 89, 182, 0.5); }
 .tab-content { display: none; animation: fadeIn 0.4s; }
 .tab-content.active { display: block; }
 @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
 .event-card { background: #161224; border-left: 4px solid #d4af37; padding: 18px; margin-bottom: 15px; border-radius: 0 8px 8px 0; }
 .event-title { font-size: 1.3em; font-weight: bold; color: #fff; margin-bottom: 8px; }
 .event-meta { font-size: 0.95em; color: #aaa; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
 .event-desc { font-size: 0.9em; color: #ccc; margin-top: 8px; padding-top: 8px; border-top: 1px solid #333; }
 #rawData { display: none; }
</style>
</head>
<body>
<h1>EL ARCHIVO</h1>
<p class="subtitle" id="fecha-act">Agenda Cultural de Asturias · Actualizado: 15/06/2026</p>
<div class="tabs" id="tabs"></div>
<div id="content"></div>
<pre id="rawData">

</pre>
<script>
 document.addEventListener('DOMContentLoaded', () => {
 const rawData = document.getElementById('rawData').innerText.trim();
 const tabsContainer = document.getElementById('tabs');
 const contentContainer = document.getElementById('content');
 const sections = ('\n' + rawData).split(/\n(?==== )/);
 let isFirst = true;

 sections.forEach((sec, index) => {
 if(sec.trim().length === 0) return;
 const lines = sec.trim().split('\n');
 let rawTitle = lines.shift().trim();
 let btnTitle = rawTitle.replace(/^=+\s*|\s*=+$/g, '').trim();
 if(!btnTitle) btnTitle = "General";

 const btn = document.createElement('button');
 btn.className = 'tab-btn' + (isFirst ? ' active' : '');
 btn.innerText = btnTitle;
 btn.onclick = () => showTab(index);
 tabsContainer.appendChild(btn);

 const div = document.createElement('div');
 div.className = 'tab-content' + (isFirst ? ' active' : '');
 div.id = 'tab-' + index;

 let htmlContent = '';
 const hasTabs = lines.some(l => l.includes('\t'));

 if(hasTabs) {
 for(let line of lines) {
 line = line.trim();
 if(!line) continue;
 const parts = line.split('\t').filter(p => p.trim());
 if(parts.length === 0) continue;
 const title = parts[0] || '';
 const meta = parts[1] ? `<div class="event-meta">📍 ${parts[1]}</div>` : '';
 const desc = parts[2] ? `<div class="event-desc">${parts[2]}</div>` : '';
 htmlContent += `<div class="event-card"><div class="event-title">${title}</div>${meta}${desc}</div>`;
 }
 } else {
 let buf = '';
 for(let line of lines) {
 line = line.trim();
 if(!line) { if(buf.trim()) { htmlContent += `<div class="event-card"><div class="event-desc">${buf.trim()}</div></div>`; buf = ''; } continue; }
 if(/^\d{1,2}\s+(de\s+)?[a-záéíóúñ]+(\s+de\s+\d{4})?/i.test(line) || /\d{4}/.test(line.slice(0,80))) {
 if(buf.trim()) { htmlContent += `<div class="event-card"><div class="event-desc">${buf.trim()}</div></div>`; }
 buf = line;
 } else {
 buf += (buf ? ' ' : '') + line;
 }
 }
 if(buf.trim()) htmlContent += `<div class="event-card"><div class="event-desc">${buf.trim()}</div></div>`;
 }
 div.innerHTML = htmlContent;
 contentContainer.appendChild(div);
 isFirst = false;
 });
 });

 function showTab(idx) {
 document.querySelectorAll('.tab-btn').forEach((b, i) => {
 if(b.innerText !== "General") b.classList.toggle('active', i === idx);
 });
 document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i === idx));
 }
</script>
</body>
</html>
